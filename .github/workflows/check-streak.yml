name: Laptop Momentum — Streak Check

on:
  schedule:
    - cron: '35 14 * * *'
  workflow_dispatch:

jobs:
  check-streak:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch recent heartbeats
        id: fetch
        env:
          TOPIC: ${{ secrets.NTFY_STATUS_TOPIC }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" "https://ntfy.sh/${TOPIC}/json?poll=1" 2>/dev/null)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "status=error" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Latest 3 message events (ntfy returns line-delimited JSON)
          MSG_LINES=$(echo "$BODY" | grep '"event":"message"' | tail -3)

          if [ -z "$MSG_LINES" ]; then
            echo "status=no_heartbeat" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SAFE=false
          MAX_ACTIVE=0
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            HEARTBEAT=$(echo "$line" | jq -r '.message // "{}"')
            ACTIVE=$(echo "$HEARTBEAT" | jq -r '.active_minutes // 0')
            STREAK_SAFE=$(echo "$HEARTBEAT" | jq -r '.streak_safe // false')

            if [ "$ACTIVE" -gt "$MAX_ACTIVE" ]; then
              MAX_ACTIVE=$ACTIVE
            fi
            if [ "$STREAK_SAFE" = "true" ]; then
              SAFE=true
            fi
          done <<< "$MSG_LINES"

          echo "status=ok" >> "$GITHUB_OUTPUT"
          echo "streak_safe=$SAFE" >> "$GITHUB_OUTPUT"
          echo "active_minutes=$MAX_ACTIVE" >> "$GITHUB_OUTPUT"

      - name: Send alert if streak at risk
        if: steps.fetch.outputs.status != 'ok' || steps.fetch.outputs.streak_safe != 'true'
        env:
          ALERT_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          STATUS="${{ steps.fetch.outputs.status }}"

          if [ "$STATUS" = "no_heartbeat" ]; then
            REASON="No activity data received today — laptop was likely off all day"
          elif [ "$STATUS" = "parse_error" ] || [ "$STATUS" = "error" ]; then
            REASON="Could not verify today's activity status"
          else
            REASON="Only ${{ steps.fetch.outputs.active_minutes }} active minute(s) reported today (need at least 2 for streak)"
          fi

          BODY="🚨 Streak at Risk!"$'\n'"$REASON"$'\n'$'\n'"Get moving and save your streak! 💪"
          curl -s -X POST "https://ntfy.sh/${ALERT_TOPIC}" \
            -H "Title: Laptop Momentum — Streak Alert" \
            -H "Priority: high" \
            -H "Tags: warning" \
            -d "$BODY"
